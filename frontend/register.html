<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Shop - Inscription</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <span class="material-symbols-outlined">storefront</span> Mon Shop
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <span class="material-symbols-outlined">home</span> Accueil
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            <span class="material-symbols-outlined">shopping_cart</span> Panier
                            <span id="cart-count" class="badge bg-danger">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            <span class="material-symbols-outlined">login</span> Connexion
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="register.html">
                            <span class="material-symbols-outlined">app_registration</span> Inscription
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="h3 mb-4 text-center">Créer un compte</h1>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Nom d'utilisateur</label>
                                <input type="text" class="form-control" id="username" autocomplete="username" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" id="email" autocomplete="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Mot de passe</label>
                                <input type="password" class="form-control" id="password" autocomplete="new-password" minlength="4" required>
                            </div>

                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label fw-semibold">Confirmer le mot de passe</label>
                                <input type="password" class="form-control" id="confirmPassword" autocomplete="new-password" minlength="4" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100" id="registerBtn">
                                <span class="material-symbols-outlined">person_add</span> Créer le compte
                            </button>
                        </form>

                        <div id="message" class="alert mt-3 d-none" role="alert"></div>

                        <p class="text-center text-muted mt-3 mb-0">
                            Déjà un compte ?
                            <a href="login.html">Se connecter</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Mon Shop - Tous droits réservés</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { isAuthenticated, register } from './js/auth.js';
        import { getCart } from './js/cart.js';

        function updateCartCount() {
            const total = getCart().reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').textContent = total;
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `alert alert-${type} mt-3`;
        }

        if (isAuthenticated()) {
            window.location.href = 'index.html';
        }

        document.getElementById('registerForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const registerBtn = document.getElementById('registerBtn');
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('Les mots de passe ne correspondent pas', 'danger');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Création...';

            const result = await register(username, email, password);

            if (result === "Compte créé avec succès") {
                showMessage('Compte créé avec succès. Redirection vers la connexion...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1200);
                return;
            }

            showMessage(result, 'danger');
            registerBtn.disabled = false;
            registerBtn.innerHTML = '<span class="material-symbols-outlined">person_add</span> Créer le compte';
        });

        updateCartCount();
    </script>
</body>
</html>
