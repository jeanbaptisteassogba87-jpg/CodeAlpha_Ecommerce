<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Shop - Accueil</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- CSS personnalisé -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <!-- Logo / Marque -->
            <a class="navbar-brand fw-bold" href="index.html">
                <span class="material-symbols-outlined">storefront</span> Mon Shop
            </a>

            <!-- Bouton hamburger (mobile) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Liens de navigation -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            <span class="material-symbols-outlined">home</span> Accueil
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            <span class="material-symbols-outlined">shopping_cart</span> Panier
                            <span id="cart-count" class="badge bg-danger">0</span>
                        </a>
                    </li>
                    <li class="nav-item" id="auth-links">
                        <a class="nav-link" href="login.html">
                            <span class="material-symbols-outlined">login</span> Connexion
                        </a>
                    </li>
                    <li class="nav-item" id="register-link">
                        <a class="nav-link" href="register.html">
                            <span class="material-symbols-outlined">app_registration</span> Inscription
                        </a>
                    </li>
                    <li class="nav-item" id="logout-link" style="display: none;">
                        <a class="nav-link" href="#" id="logoutBtn">
                            <span class="material-symbols-outlined">logout</span> Déconnexion
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ==================== CONTENU PRINCIPAL ==================== -->
    <div class="container mt-4">
        <h1 class="text-center mb-4">🛍️ Nos Produits</h1>
        <div id="product-list" class="row">
            <!-- Les produits seront chargés ici dynamiquement par JavaScript -->
        </div>
    </div>

    <!-- ==================== FOOTER ==================== -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 Mon Shop - Tous droits réservés</p>
    </footer>

    <!-- ==================== SCRIPTS ==================== -->
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modules JavaScript (type="module" pour utiliser les imports/exports) -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/cart.js"></script>
    <script type="module" src="js/products.js"></script>

    <!-- Script principal de la page -->
    <script type="module">
        import { isAuthenticated, logout } from './js/auth.js';
        import { loadProducts } from './js/products.js';
        import { getCart } from './js/cart.js';

        // 1. Gestion de l'affichage selon connexion
        function updateAuthUI() {
            const authLinks = document.getElementById('auth-links');
            const registerLink = document.getElementById('register-link');
            const logoutLink = document.getElementById('logout-link');

            if (isAuthenticated()) {
                authLinks.style.display = 'none';
                registerLink.style.display = 'none';
                logoutLink.style.display = 'block';
            } else {
                authLinks.style.display = 'block';
                registerLink.style.display = 'block';
                logoutLink.style.display = 'none';
            }
        }

        // 2. Mise à jour du compteur du panier
        function updateCartCount() {
            const cart = getCart();
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCount = document.getElementById('cart-count');
            if (cartCount) {
                cartCount.textContent = total;
            }
        }

        // 3. Déconnexion
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            logout();
            updateAuthUI();
            window.location.href = 'index.html';
        });

        // 4. Charger les produits
        async function displayProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = '<div class="text-center">Chargement...</div>';

            const products = await loadProducts();

            if (products.length === 0) {
                container.innerHTML = '<div class="text-center">Aucun produit disponible.</div>';
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <img src="${product.image || 'https://via.placeholder.com/300x200'}"
                             class="card-img-top"
                             alt="${product.name}"
                             style="height: 200px; object-fit: cover;">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${product.name}</h5>
                            <p class="card-text text-success fw-bold">${product.price} FCFA</p>
                            <p class="card-text small">${(product.description || '').substring(0, 80)}...</p>
                            <div class="mt-auto">
                                <a href="product-detail.html?id=${product.id}" class="btn btn-outline-primary btn-sm">Voir détails</a>
                                <button class="btn btn-primary btn-sm add-to-cart" data-id="${product.id}">
                                    <span class="material-symbols-outlined">add_shopping_cart</span> Ajouter
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            // Ajouter les écouteurs d'événements pour les boutons "Ajouter au panier"
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', function() {
                    const productId = parseInt(this.dataset.id);
                    import('./js/cart.js').then(module => {
                        module.addToCart(productId, 1);
                        updateCartCount();
                        alert('Produit ajouté au panier !');
                    });
                });
            });
        }

        // 5. Initialisation au chargement de la page
        updateAuthUI();
        updateCartCount();
        displayProducts();
    </script>
</body>
</html>
